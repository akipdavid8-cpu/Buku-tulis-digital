<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buku Tulis Digital PRO</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <button id="menuBtn">☰</button>
  <input id="pageTitle" placeholder="Judul halaman...">
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h3>MENU</h3>

  <button onclick="newPage()">+ Tambah Halaman</button>
  <button onclick="setTool('pen')">✏️ Pensil</button>
  <button onclick="setTool('brush')">🖌 Kuas</button>
  <button onclick="setTool('eraser')">🧽 Penghapus</button>

  <label>Warna Kuas</label>
  <input type="color" id="colorPicker" onchange="setColor(this.value)">

  <input type="file" accept="image/*" onchange="uploadImage(event)">
  <input type="file" accept="application/pdf" onchange="uploadPDF(event)">

  <button onclick="exportPDF()">📄 Export PDF</button>
  <button onclick="savePage()">💾 Save</button>

  <hr>
  <h4>Riwayat</h4>
  <div id="history"></div>
</div>

<!-- CANVAS -->
<canvas id="canvas"></canvas>

<script src="script.js"></script>
</body>
</html>
