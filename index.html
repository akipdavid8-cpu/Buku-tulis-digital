<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buku Tulis Digital PRO</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Amatic+SC&family=Bad+Script&family=Caveat:wght@400;700&family=Cedarville+Cursive&family=Covered+By+Your+Grace&family=Courgette&family=Dancing+Script&family=Gloria+Hallelujah&family=Great+Vibes&family=Handlee&family=Homemade+Apple&family=Indie+Flower&family=Itim&family=Kalam&family=Kaushan+Script&family=Marck+Script&family=Merienda&family=Nanum+Pen+Script&family=Neucha&family=Nothing+You+Could+Do&family=Pacifico&family=Patrick+Hand&family=Permanent+Marker&family=Reenie+Beanie&family=Rock+Salt&family=Sacramento&family=Satisfy&family=Shadows+Into+Light&family=Yellowtail&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">

  <div class="logo-area">
    <div class="logo">📓</div>
    <h1>Buku Tulis PRO</h1>
  </div>

  <!-- HALAMAN -->
  <div class="section">
    <div class="section-title">HALAMAN</div>

    <input type="text" id="pageTitleInput" placeholder="Judul halaman..." />

    <div id="pageList" class="page-list"></div>

    <button id="btnAddPage" class="btn">
      + Tambah Halaman
    </button>
  </div>

  <!-- TOOLS -->
  <div class="section">
    <div class="section-title">ALAT</div>

    <button class="tool-btn active" id="toolText">✏️ Tulis</button>
    <button class="tool-btn" id="toolDraw">🖊️ Gambar</button>
    <button class="tool-btn" id="toolErase">🧹 Hapus</button>
    <button class="tool-btn" id="toolImage">🖼️ Upload Gambar</button>
    <button class="tool-btn" id="toolSign">🖋️ Tanda Tangan</button>
  </div>

  <!-- FONT -->
  <div class="section">
    <div class="section-title">GAYA TULISAN</div>

    <select id="fontStyleSelect">
      <option value="'Caveat', cursive">Caveat</option>
      <option value="'Pacifico', cursive">Pacifico</option>
      <option value="'Indie Flower', cursive">Indie Flower</option>
      <option value="'Shadows Into Light', cursive">Shadows Into Light</option>
      <option value="'Satisfy', cursive">Satisfy</option>
      <option value="'Handlee', cursive">Handlee</option>
      <option value="'Patrick Hand', cursive">Patrick Hand</option>
      <option value="'Amatic SC', cursive">Amatic SC</option>
      <option value="'Dancing Script', cursive">Dancing Script</option>
      <option value="'Great Vibes', cursive">Great Vibes</option>
      <option value="'Kalam', cursive">Kalam</option>
      <option value="'Marck Script', cursive">Marck Script</option>
      <option value="'Kaushan Script', cursive">Kaushan Script</option>
      <option value="'Sacramento', cursive">Sacramento</option>
      <option value="'Allura', cursive">Allura</option>
      <option value="'Courgette', cursive">Courgette</option>
      <option value="'Yellowtail', cursive">Yellowtail</option>
      <option value="'Gloria Hallelujah', cursive">Gloria Hallelujah</option>
      <option value="'Bad Script', cursive">Bad Script</option>
      <option value="'Nanum Pen Script', cursive">Nanum Pen Script</option>
      <option value="'Permanent Marker', cursive">Permanent Marker</option>
      <option value="'Reenie Beanie', cursive">Reenie Beanie</option>
      <option value="'Rock Salt', cursive">Rock Salt</option>
      <option value="'Homemade Apple', cursive">Homemade Apple</option>
      <option value="'Covered By Your Grace', cursive">Covered By Your Grace</option>
      <option value="'Nothing You Could Do', cursive">Nothing You Could Do</option>
      <option value="'Itim', cursive">Itim</option>
      <option value="'Merienda', cursive">Merienda</option>
      <option value="'Cedarville Cursive', cursive">Cedarville Cursive</option>
      <option value="'Neucha', cursive">Neucha</option>
    </select>
  </div>

  <!-- PEN -->
  <div class="section">
    <div class="section-title">PENA</div>

    <input type="color" id="penColor" value="#1a1a2e"/>

    <input type="range" id="penSize" min="1" max="20" value="3"/>

    <div id="penSizeLabel">3px</div>
  </div>

  <!-- FILE -->
  <div class="section">
    <div class="section-title">FILE</div>

    <button id="btnSaveTxt" class="btn">💾 Simpan TXT</button>

    <button id="btnLoadTxt" class="btn">
      📂 Upload TXT
    </button>

    <button id="btnHistory" class="btn">
      🕘 Riwayat
    </button>

    <button id="btnInfo" class="btn">
      ℹ️ Info
    </button>
  </div>

</aside>

<!-- MAIN -->
<main class="main">

  <div class="topbar">
    <button id="hamburger">☰</button>

    <div id="currentPageLabel">
      Halaman 1
    </div>
  </div>

  <!-- NOTE -->
  <div class="notebook-page" id="notebookPage">

    <canvas id="drawCanvas"></canvas>

    <div class="text-layer">
      <div
        id="mainTextBlock"
        class="text-block"
        contenteditable="true"
        spellcheck="false"
        data-placeholder="Mulai menulis..."
      ></div>
    </div>

    <div id="imageLayer"></div>

  </div>

</main>

<!-- FILE -->
<input type="file" id="imageInput" accept="image/*" hidden>
<input type="file" id="txtInput" accept=".txt" hidden>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>

</body>
  </html>
