<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Notes Pro</title>

<link rel="stylesheet" href="style.css"/>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<!-- ================= TOOLBAR ================= -->
<div class="toolbar">

  <!-- NOTE CONTROL -->
  <button onclick="newNote()">📄 Catatan Baru</button>
  <button onclick="addPage()">➕ Halaman</button>

  <!-- TITLE -->
  <input id="title" type="text" placeholder="Judul catatan..." />

  <!-- TOOL MODE -->
  <button onclick="setTool('pen')">✏️ Pena</button>
  <button onclick="setTool('pencil')">🖌️ Pensil</button>
  <button onclick="setTool('eraser')">🧽 Hapus</button>

  <!-- COLOR -->
  <input type="color" onchange="setColor(this.value)" />

  <!-- SIZE -->
  <select onchange="setSize(this.value)">
    <option value="2">Tipis</option>
    <option value="4">Normal</option>
    <option value="8">Tebal</option>
    <option value="15">Sangat Tebal</option>
  </select>

  <!-- IMAGE UPLOAD -->
  <input type="file" accept="image/*" onchange="addImage(event)" />

  <!-- UNDO REDO -->
  <button onclick="undo()">↩️ Undo</button>
  <button onclick="redo()">↪️ Redo</button>

  <!-- SAVE -->
  <button onclick="savePDF()">💾 Save PDF</button>

</div>

<!-- ================= CANVAS AREA ================= -->
<div class="container">
  <canvas id="canvas"></canvas>
</div>

<!-- ================= SCRIPT ================= -->
<script src="app.js"></script>

</body>
</html>
