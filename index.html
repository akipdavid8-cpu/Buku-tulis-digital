<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buku Tulis Ultra Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=DM+Sans:wght@300;400;500;700&family=Patrick+Hand&family=Indie+Flower&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="logo">📓 Buku Tulis Ultra</div>

  <div class="section">
    <h3>Halaman</h3>
    <div id="pageList"></div>
    <button id="addPage">+ Tambah Halaman</button>
  </div>

  <div class="section">
    <h3>Alat</h3>
    <button class="tool active" data-tool="text">✏️ Tulis</button>
    <button class="tool" data-tool="draw">🖊️ Gambar</button>
    <button class="tool" data-tool="erase">🧹 Hapus</button>
    <button class="tool" id="addImageBtn">🖼️ Gambar</button>
  </div>

  <div class="section">
    <h3>Gaya Tulisan</h3>
    <select id="fontSelect">
      <option value="Caveat">Caveat</option>
      <option value="Patrick Hand">Patrick Hand</option>
      <option value="Indie Flower">Indie Flower</option>
      <option value="DM Sans">DM Sans</option>
    </select>

    <input type="color" id="fontColor" value="#1a1a2e">

    <input type="range" id="fontSize" min="16" max="40" value="22">
    <span id="fontSizeLabel">22px</span>
  </div>

  <div class="section">
    <h3>Tema</h3>
    <button id="themeBtn">🌙 Dark Mode</button>
  </div>

  <div class="section">
    <h3>Ekspor</h3>
    <button id="saveTxt">📄 Simpan TXT</button>
    <button id="savePng">🖼️ Simpan PNG</button>
  </div>

  <div class="section">
    <h3>Info</h3>
    <button id="infoBtn">ℹ️ Tentang App</button>
  </div>
</aside>

<button class="menuBtn" id="menuBtn">☰</button>

<main class="main">
  <div class="topbar">
    <input type="text" id="pageTitle" placeholder="Judul halaman...">
  </div>

  <div class="paper" id="paper">
    <canvas id="canvas"></canvas>

    <div
      id="editor"
      class="editor"
      contenteditable="true"
      spellcheck="false"
      data-placeholder="Mulai menulis novel atau catatan di sini..."
    ></div>

    <div id="imageLayer"></div>
  </div>
</main>

<input type="file" id="imageInput" accept="image/*" hidden>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
