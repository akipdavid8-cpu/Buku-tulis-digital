name: Build Buku Tulis Digital APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create WWW Folder
        run: |
          mkdir www
          cp index.html www/
          cp *.css www/ || true
          cp *.js www/ || true

          if [ -d assets ]; then
            cp -r assets www/
          fi

      - name: Install Capacitor
        run: |
          npm install @capacitor/core
          npm install @capacitor/cli
          npm install @capacitor/android

      - name: Initialize Capacitor
        run: |
          npx cap init "Buku Tulis Digital" "com.bukutulisdigital.app" --web-dir=www

      - name: Add Android
        run: |
          npx cap add android

      - name: Sync Android
        run: |
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Buku-Tulis-Digital-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
