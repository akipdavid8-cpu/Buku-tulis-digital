name: Build Buku Tulis Digital APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Create WWW Folder
        run: |
          mkdir -p www
          cp index.html www/
          cp *.css www/ || true
          cp *.js www/ || true

          if [ -d assets ]; then
            cp -r assets www/
          fi

      - name: Install Capacitor 7
        run: |
          npm install @capacitor/core@latest
          npm install @capacitor/cli@latest
          npm install @capacitor/android@latest

      - name: Initialize Capacitor
        run: |
          npx cap init "Buku Tulis Digital" "com.bukutulisdigital.app" --web-dir=www

      - name: Add Android Platform
        run: |
          npx cap add android

      - name: Fix Gradle Java Version
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Sync Android
        run: |
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --warning-mode all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Buku-Tulis-Digital-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
